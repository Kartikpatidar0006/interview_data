{topic:"DL", q:"What is a Generative Adversarial Network, GAN?", a:"A GAN consists of two neural networks, a generator that creates fake data trying to resemble real data, and a discriminator that tries to distinguish real data from the generator's fake data, trained together in a competitive process. Over time, the generator improves until its outputs become difficult for the discriminator to distinguish from real data.", eg:"A GAN trained on thousands of real human face photos can learn to generate entirely new, realistic-looking faces of people who don't actually exist, as the generator progressively gets better at fooling the discriminator."},
{topic:"DL", q:"What is pooling in a Convolutional Neural Network?", a:"Pooling is a downsampling operation applied after convolutional layers that reduces the spatial dimensions of feature maps, decreasing computation and helping the network become more robust to small translations in the input. Max pooling, which takes the maximum value in each region, is the most common type.", eg:"Applying 2x2 max pooling to a feature map halves its width and height by keeping only the strongest activation in each 2x2 region, reducing the data the next layer needs to process while retaining the most important features."},
{topic:"DL", q:"What is LSTM and why is it better than a plain RNN?", a:"LSTM, Long Short-Term Memory, is a type of recurrent neural network that uses gates, specifically input, forget, and output gates, to control what information is retained or discarded from a cell state over time. This structure allows it to capture long-range dependencies far better than a plain RNN, which suffers from vanishing gradients over long sequences.", eg:"In predicting the next word of 'I grew up in France... I speak fluent [blank]', an LSTM can retain the relevant context about France from many words earlier through its cell state, while a plain RNN would likely have forgotten it by that point."},
{topic:"DL", q:"What is the attention mechanism?", a:"The attention mechanism allows a model to dynamically focus on the most relevant parts of the input when producing each part of the output, by computing a weighted combination of input representations rather than relying on a single fixed-size summary. It removed the bottleneck of earlier sequence models that had to compress an entire input into one fixed vector.", eg:"When translating a long sentence, attention lets the model look back at the specific source words most relevant to the word it's currently generating, rather than relying solely on a single compressed representation of the whole sentence."},
{topic:"DL", q:"Why does weight initialization matter in deep networks?", a:"Weight initialization sets the starting values of a network's parameters before training begins, and poor initialization, such as all zeros or overly large random values, can lead to vanishing or exploding gradients, slowing or preventing learning entirely. Techniques like Xavier or He initialization are designed to keep the scale of activations and gradients stable across layers.", eg:"Initializing all weights to zero would make every neuron in a layer learn identical features, since they'd all receive the same gradient updates, effectively wasting the network's capacity."},
{topic:"DL", q:"What is early stopping?", a:"Early stopping is a regularization technique where training is halted once the model's performance on a validation set stops improving, even if training loss continues to decrease. This prevents the model from continuing to overfit the training data beyond the point of optimal generalization.", eg:"If validation accuracy peaks at epoch 15 and starts declining afterward while training accuracy keeps rising, early stopping would save the model from epoch 15 rather than the final epoch 50, which would likely be overfit."},
{topic:"DL", q:"What is fine-tuning in deep learning?", a:"Fine-tuning is the process of taking a pretrained model and continuing to train it, usually with a smaller learning rate, on a new, often smaller and task-specific dataset, adjusting some or all of its weights to specialize it for the new task. It's a specific application of transfer learning commonly used with large pretrained language and vision models.", eg:"A general-purpose pretrained language model can be fine-tuned on a company's customer support transcripts so it learns the specific tone and terminology used in that company's support conversations."},

{topic:"Agentic AI", q:"What is prompt engineering and why does it matter for agents?", a:"Prompt engineering is the practice of carefully crafting instructions given to a language model to reliably produce the desired behavior, including specifying format, examples, and constraints. In agentic systems, well-engineered prompts are critical because they define the agent's role, available tools, and reasoning approach, directly affecting task reliability.", eg:"An agent's system prompt might explicitly instruct it to always check a tool's output before responding, and to ask for clarification rather than guess when required information is missing, both of which are prompt engineering choices."},
{topic:"Agentic AI", q:"What is an orchestrator agent?", a:"An orchestrator agent is a central controller in a multi-agent system that breaks down a complex task into sub-tasks, delegates them to specialized sub-agents, and combines their results into a final output. It manages the overall workflow rather than performing the specialized work itself.", eg:"In a research assistant system, an orchestrator might delegate web searching to one agent, summarization to another, and citation formatting to a third, then assemble their outputs into one coherent report."},
{topic:"Agentic AI", q:"What is a context window and why does it matter for agents?", a:"The context window is the maximum amount of text, measured in tokens, that a language model can consider at once when generating a response, including the conversation history, instructions, and tool outputs. For agents performing long, multi-step tasks, managing the context window carefully is important since exceeding it means older information gets dropped or truncated.", eg:"An agent researching a topic across 20 tool calls needs a strategy, like summarizing earlier findings, to avoid exceeding its context window before it can compile a final answer."},
{topic:"Agentic AI", q:"What is hallucination in LLMs and how do agents mitigate it?", a:"Hallucination refers to a language model generating text that sounds plausible but is factually incorrect or fabricated, since the model is predicting likely text rather than verifying truth. Agents mitigate this by grounding responses in retrieved data through RAG, verifying claims using external tools, or adding a review step before finalizing an answer.", eg:"An agent asked for a company's current stock price would hallucinate a plausible-sounding number if it just guessed from training data, but calling a real-time financial API tool grounds the answer in an actual verified source."},
{topic:"Agentic AI", q:"What is a vector database and why is it used with LLMs?", a:"A vector database stores data as high-dimensional numerical embeddings that capture semantic meaning, allowing similarity search based on meaning rather than exact keyword matches. It's commonly used to power the retrieval step in RAG systems, finding the most relevant documents for a given query.", eg:"Searching a vector database for 'how do I reset my password' can return a relevant support article titled 'recovering account access' even without any exact word overlap, because their embeddings are semantically close."},
{topic:"Agentic AI", q:"What is chain-of-thought prompting?", a:"Chain-of-thought prompting encourages a language model to generate intermediate reasoning steps before arriving at a final answer, rather than jumping directly to a conclusion. This often improves accuracy on complex reasoning or multi-step problems by making the model's reasoning process explicit.", eg:"Instead of directly asking for the answer to a multi-step math word problem, prompting the model to 'think step by step' often produces a correct breakdown of each calculation before the final answer, reducing careless errors."},
{topic:"Agentic AI", q:"What are guardrails in agentic AI systems?", a:"Guardrails are constraints and checks built around an AI agent to prevent it from taking harmful, unintended, or out-of-scope actions, such as input validation, output filtering, permission restrictions on tools, or confirmation steps before high-risk actions. They help ensure an autonomous agent operates safely within defined boundaries.", eg:"An agent with access to a 'delete_file' tool might have a guardrail requiring explicit user confirmation before executing any delete action, preventing accidental or malicious data loss."},
{topic:"Agentic AI", q:"What is human-in-the-loop in the context of AI agents?", a:"Human-in-the-loop refers to designing an agentic workflow so that a human reviews, approves, or intervenes at key decision points rather than letting the agent act with full autonomy. It's especially important for high-stakes or irreversible actions where errors would be costly.", eg:"An agent drafting and sending customer refund approvals might automatically prepare the refund but require a human manager to click approve before the payment is actually processed."},
{topic:"Agentic AI", q:"What is the difference between zero-shot and few-shot prompting?", a:"Zero-shot prompting asks a model to perform a task with only an instruction and no examples of the desired output. Few-shot prompting provides a small number of example input-output pairs within the prompt to guide the model toward the expected format or style before it handles the actual task.", eg:"Asking a model to classify sentiment with no examples is zero-shot, while first showing it two or three labeled example reviews and their sentiment before asking it to classify a new review is few-shot."},
{topic:"Agentic AI", q:"What is MCP, Model Context Protocol, in relation to agent tools?", a:"MCP is a standardized protocol that defines how AI applications connect language models to external tools, data sources, and services in a consistent way, rather than every application building its own custom integration for each tool. It allows an agent to discover and call tools, such as a calendar or database, through a common interface.", eg:"Instead of an AI application writing separate custom code to connect to Slack, Google Drive, and a database each with different formats, MCP provides a consistent way for the agent to discover and use all three as tools."},
{topic:"Agentic AI", q:"What is the difference between agent planning and agent execution?", a:"Planning is the phase where an agent reasons about the sequence of steps or sub-tasks needed to accomplish a goal, often before taking any action. Execution is the phase where the agent actually carries out those steps, such as calling tools or generating outputs, and may involve re-planning if results differ from what was expected.", eg:"For the task 'plan a 3-day trip to Goa', an agent might first plan the steps needed: find flights, find hotels, suggest an itinerary, and then execute each step by actually calling search tools for flights and hotels."},
{topic:"Agentic AI", q:"What is the difference between fine-tuning an LLM and using RAG for an agent?", a:"Fine-tuning changes the model's internal weights by further training it on task-specific data, embedding that knowledge directly into the model, which is costly and needs retraining whenever the information changes. RAG keeps the base model unchanged and instead retrieves relevant, up-to-date information at query time to include as context, making it easier and cheaper to keep information current.", eg:"A company wanting its agent to always reflect the latest product pricing would prefer RAG, since updating a database is far simpler than retraining a fine-tuned model every time prices change."},

{topic:"Programming & OOPs", q:"What are the four pillars of Object-Oriented Programming?", a:"The four pillars are Encapsulation, bundling data and methods together while restricting direct access; Inheritance, allowing a class to acquire properties of another; Polymorphism, allowing the same method or interface to behave differently depending on the object; and Abstraction, hiding implementation details and exposing only essential features.", eg:"A 'Vehicle' base class demonstrates all four: it encapsulates fuel and speed data, is inherited by 'Car' and 'Bike', exposes an abstract 'move()' method whose details are hidden, and each subclass overrides 'move()' polymorphically."},
{topic:"Programming & OOPs", q:"What is encapsulation?", a:"Encapsulation is the practice of bundling data and the methods that operate on it into a single unit, a class, while restricting direct access to internal data using access modifiers like private or protected. External code interacts with the object only through public methods, which protects the internal state from unintended changes.", eg:"A BankAccount class keeps its 'balance' field private and only allows it to change through a 'deposit()' or 'withdraw()' method, preventing external code from setting an invalid negative balance directly."},
{topic:"Programming & OOPs", q:"What is inheritance and why is it useful?", a:"Inheritance allows a new class, called a subclass or derived class, to acquire the properties and behaviors of an existing class, called a superclass or base class. It promotes code reuse and lets you model real-world 'is-a' relationships between classes.", eg:"A 'Manager' class can inherit common fields like name and salary from an 'Employee' class, then add its own extra field like 'teamSize', without rewriting the shared logic."},
{topic:"Programming & OOPs", q:"What is polymorphism, and what are its types?", a:"Polymorphism means the same function or method name behaves differently depending on the object or the arguments passed. It comes in two forms: compile-time polymorphism, achieved through method overloading, and runtime polymorphism, achieved through method overriding using inheritance.", eg:"A 'Shape' base class with a draw() method behaves differently when called on a 'Circle' or 'Square' object, since each subclass overrides draw() with its own logic, resolved at runtime based on the actual object type."},
{topic:"Programming & OOPs", q:"What is abstraction and how is it different from encapsulation?", a:"Abstraction focuses on hiding complexity by exposing only essential features and behavior while hiding implementation details, typically achieved through abstract classes or interfaces. Encapsulation focuses on hiding the internal data of an object using access control. Abstraction is about design and what is shown, while encapsulation is about protecting how it's stored.", eg:"A car's steering wheel and pedals are an abstraction, letting you drive without knowing the engine's internal mechanics, while the engine itself being sealed off from tampering is encapsulation."},
{topic:"Programming & OOPs", q:"What is the difference between an abstract class and an interface?", a:"An abstract class can have both fully implemented methods and abstract methods that must be implemented by subclasses, and a class can inherit from only one abstract class. An interface traditionally only declares method signatures with no implementation, and a class can implement multiple interfaces, allowing a form of multiple inheritance of behavior.", eg:"An abstract 'Animal' class might implement a common 'breathe()' method while leaving 'makeSound()' abstract for subclasses, whereas an interface 'Flyable' would just declare a 'fly()' method that any unrelated class like 'Bird' or 'Airplane' could implement."},
{topic:"Programming & OOPs", q:"What is a constructor and what are its types?", a:"A constructor is a special method automatically called when an object is created, used to initialize its state. Types include a default constructor with no parameters, a parameterized constructor that accepts arguments to set initial values, and a copy constructor that creates a new object as a copy of an existing one.", eg:"A Point class might have a default constructor setting coordinates to (0,0), and a parameterized constructor Point(x, y) letting you create a point at a specific location directly."},
{topic:"Programming & OOPs", q:"What is the difference between method overloading and method overriding?", a:"Method overloading occurs when multiple methods in the same class share the same name but differ in the number or type of parameters, resolved at compile time. Method overriding occurs when a subclass provides its own implementation of a method already defined in its superclass with the same signature, resolved at runtime based on the actual object type.", eg:"Overloading: a Calculator class having add(int, int) and add(double, double). Overriding: a Dog class redefining a Sound() method that was already defined in its Animal superclass."},
{topic:"Programming & OOPs", q:"What does the static keyword mean in OOP?", a:"A static member, whether a variable or method, belongs to the class itself rather than to any individual object, meaning it's shared across all instances and can typically be accessed without creating an object. Static variables are commonly used for values common to all instances, like a counter.", eg:"A static variable 'totalStudents' in a Student class increments every time a new object is created, giving a shared count across all Student instances rather than a separate count per object."},
{topic:"Programming & OOPs", q:"What is the difference between a class and an object?", a:"A class is a blueprint or template that defines the properties and behaviors an object of that type will have, but it doesn't occupy memory for actual data until instantiated. An object is a concrete instance of a class, created in memory, with its own actual values for the properties defined by the class.", eg:"'Car' as a class defines that every car has a color and speed, while 'myRedCar' as an object is an actual instance with color set to red and speed set to 80."},
{topic:"Programming & OOPs", q:"What is the 'this' keyword used for?", a:"The 'this' keyword refers to the current instance of the class within a non-static method or constructor, used to distinguish between instance variables and parameters or local variables that share the same name, and to pass or return the current object itself.", eg:"In a constructor like 'this.name = name;', 'this.name' refers to the object's field while the plain 'name' refers to the parameter passed in, since both share the same identifier."},
{topic:"Programming & OOPs", q:"What is dynamic method dispatch or virtual functions?", a:"Dynamic method dispatch is the mechanism by which a call to an overridden method is resolved at runtime based on the actual type of the object, rather than the type of the reference variable, and it's what enables runtime polymorphism. In some languages like C++, this requires explicitly marking a method as virtual.", eg:"If an Animal reference actually points to a Dog object, calling makeSound() on that reference invokes Dog's overridden version at runtime, not Animal's, because of dynamic dispatch."},
{topic:"Programming & OOPs", q:"What is the diamond problem in multiple inheritance?", a:"The diamond problem occurs when a class inherits from two classes that both inherit from a common base class, creating ambiguity about which version of an inherited method or field should be used. Languages like Java avoid this by disallowing multiple inheritance of classes and instead using interfaces, while C++ resolves it explicitly using virtual inheritance.", eg:"If classes B and C both inherit from A, and class D inherits from both B and C, calling a method originally defined in A through a D object becomes ambiguous about which path, B's or C's, should be used."},
{topic:"Programming & OOPs", q:"What is the difference between composition and inheritance?", a:"Inheritance models an 'is-a' relationship where a subclass extends a superclass and gains its behavior automatically. Composition models a 'has-a' relationship where a class contains an instance of another class as a field and delegates work to it, offering more flexibility since relationships can be changed at runtime without rigid class hierarchies.", eg:"A 'Car' class using inheritance from 'Vehicle' models 'a Car is a Vehicle', while a 'Car' class containing an 'Engine' object as a field models 'a Car has an Engine', and the engine type could be swapped without changing the Car's class hierarchy."},
{topic:"Programming & OOPs", q:"What is exception handling and why is it important?", a:"Exception handling is a mechanism for detecting and responding to runtime errors gracefully using constructs like try, catch, and finally, instead of letting the program crash abruptly. It separates error-handling code from normal logic and allows a program to recover or fail safely.", eg:"Reading a file that doesn't exist would normally crash a program, but wrapping that operation in a try-catch block lets you catch the specific exception and show a user-friendly error message instead."},
{topic:"Programming & OOPs", q:"What is garbage collection?", a:"Garbage collection is an automatic memory management process where the runtime periodically identifies objects that are no longer reachable or referenced by the program and frees their memory, so developers don't need to manually deallocate memory. Languages like Java and Python use garbage collection, while C++ generally requires manual memory management.", eg:"Once a locally created object inside a function has no remaining references after the function returns, the garbage collector will eventually reclaim its memory without the developer explicitly calling a delete or free operation."},
{topic:"Programming & OOPs", q:"What is the difference between pass by value and pass by reference?", a:"In pass by value, a copy of the actual argument is passed to the function, so changes made inside the function don't affect the original variable. In pass by reference, the function receives a reference to the original variable's memory location, so changes made inside the function do affect the original.", eg:"Passing an integer to a function in most languages passes by value, so modifying it inside the function leaves the caller's variable unchanged, while passing an object reference in Java lets the function modify the object's actual fields as seen by the caller."},
{topic:"Programming & OOPs", q:"What is the difference between a shallow copy and a deep copy?", a:"A shallow copy creates a new object but copies references to any nested objects rather than the nested objects themselves, so changes to a nested object affect both copies. A deep copy recursively copies all nested objects too, producing a completely independent clone with no shared references.", eg:"Shallow-copying a Person object containing an Address object would leave both the original and the copy pointing to the same Address, so updating the copy's address would also change the original's, whereas a deep copy would give each Person its own separate Address object."},
{topic:"Programming & OOPs", q:"What are the SOLID principles, briefly?", a:"SOLID is a set of five object-oriented design principles: Single Responsibility, a class should have only one reason to change; Open/Closed, classes should be open for extension but closed for modification; Liskov Substitution, subclasses should be replaceable for their base class without breaking behavior; Interface Segregation, prefer many small specific interfaces over one large general one; and Dependency Inversion, depend on abstractions rather than concrete implementations.", eg:"Violating Single Responsibility would look like a single 'User' class that handles both database storage and email notifications; splitting those into a 'UserRepository' and a 'EmailService' class follows the principle instead."},
{topic:"Programming & OOPs", q:"What are access modifiers and what do they control?", a:"Access modifiers control the visibility and accessibility of classes, methods, and fields from other parts of a program. Common modifiers are public, accessible from anywhere; private, accessible only within the same class; and protected, accessible within the same class and its subclasses.", eg:"Marking a BankAccount's 'balance' field as private prevents any code outside the class from directly modifying it, forcing all changes to go through controlled public methods like deposit() and withdraw()."}

  const list = document.getElementById('topicList');
  const counts = {};
  topics.forEach(t=>counts[t]=DATA.filter(d=>d.topic===t).length);
  let html = `<div class="topic-item ${activeTopic==='All'?'active':''}" data-topic="All"><span>All topics</span><span class="topic-count">${DATA.length}</span></div>`;
  topics.forEach(t=>{
    html += `<div class="topic-item ${activeTopic===t?'active':''}" data-topic="${t}"><span>${t}</span><span class="topic-count">${counts[t]}</span></div>`;
  });
  list.innerHTML = html;
  list.querySelectorAll('.topic-item').forEach(el=>{
    el.addEventListener('click',()=>{
      activeTopic = el.dataset.topic;
      renderSidebar();
      renderMain();
    });
  });
}

function renderMain(){
  const main = document.getElementById('mainContent');
  let filtered = DATA.filter(d=>{
    const matchTopic = activeTopic==='All' || d.topic===activeTopic;
    const matchSearch = d.q.toLowerCase().includes(searchTerm.toLowerCase());
    return matchTopic && matchSearch;
  });
  if(filtered.length===0){
    main.innerHTML = `<div class="empty">No questions match your search.</div>`;
    return;
  }
  const grouped = {};
  filtered.forEach(d=>{
    if(!grouped[d.topic]) grouped[d.topic]=[];
    grouped[d.topic].push(d);
  });
  let html = '';
  Object.keys(grouped).forEach(topic=>{
    html += `<div class="section-title">${topic} · ${grouped[topic].length} questions</div>`;
    grouped[topic].forEach((d,i)=>{
      const idx = DATA.indexOf(d);
      html += `
      <div class="card" data-idx="${idx}">
        <div class="q-row">
          <span class="q-tag">${idx+1}</span>
          <span class="q-text">${d.q}</span>
          <span class="chevron">&#9656;</span>
        </div>
        <div class="answer">
          <p>${d.a}</p>
          <div class="eg"><b>Example — </b>${d.eg}</div>
        </div>
      </div>`;
    });
  });
  main.innerHTML = html;
  main.querySelectorAll('.card').forEach(card=>{
    card.querySelector('.q-row').addEventListener('click',()=>{
      card.classList.toggle('open');
    });
  });
}

document.getElementById('searchBox').addEventListener('input', e=>{
  searchTerm = e.target.value;
  renderMain();
});

renderSidebar();
renderMain();

/* ===== Mock interview mode ===== */
const MOCK_DURATION = 30*60;
let mockQuestions = [];
let mockIndex = 0;
let timeLeft = MOCK_DURATION;
let timerInterval = null;

function shuffle(arr){
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function startMock(){
  mockQuestions = shuffle(DATA).slice(0, 25);
  mockIndex = 0;
  timeLeft = MOCK_DURATION;
  document.getElementById('mockOverlay').classList.add('show');
  renderMockPanel();
  clearInterval(timerInterval);
  timerInterval = setInterval(()=>{
    timeLeft--;
    if(timeLeft<=0){
      clearInterval(timerInterval);
      timeLeft=0;
      renderTimeUp();
    } else {
      updateTimerDisplay();
    }
  },1000);
}

function updateTimerDisplay(){
  const el = document.getElementById('timerDigits');
  if(!el) return;
  const m = String(Math.floor(timeLeft/60)).padStart(2,'0');
  const s = String(timeLeft%60).padStart(2,'0');
  el.textContent = `${m}:${s}`;
  el.classList.toggle('low', timeLeft<=120);
}

function renderMockPanel(){
  const q = mockQuestions[mockIndex];
  const panel = document.getElementById('mockPanel');
  const m = String(Math.floor(timeLeft/60)).padStart(2,'0');
  const s = String(timeLeft%60).padStart(2,'0');
  let dots = mockQuestions.map((_,i)=>{
    let cls = 'dot';
    if(i<mockIndex) cls+=' done';
    if(i===mockIndex) cls+=' current';
    return `<span class="${cls}"></span>`;
  }).join('');
  panel.innerHTML = `
    <div class="mock-top">
      <div class="timer-ring-wrap">
        <span id="timerDigits" class="timer-digits mono ${timeLeft<=120?'low':''}">${m}:${s}</span>
        <span class="mock-progress-label">question ${mockIndex+1} / ${mockQuestions.length}</span>
      </div>
      <button class="close-mock" id="closeMockBtn">&#10005;</button>
    </div>
    <div class="mock-q-tag">${q.topic}</div>
    <div class="mock-q">${q.q}</div>
    <button class="reveal-btn" id="revealBtn">Show answer</button>
    <div class="mock-answer" id="mockAnswer">
      <p>${q.a}</p>
      <div class="eg"><b>Example — </b>${q.eg}</div>
    </div>
    <div class="mock-nav">
      <button class="nav-btn" id="prevBtn" ${mockIndex===0?'disabled':''}>Previous</button>
      <button class="nav-btn primary" id="nextBtn">${mockIndex===mockQuestions.length-1?'Finish':'Next question'}</button>
    </div>
    <div class="dots">${dots}</div>
  `;
  document.getElementById('closeMockBtn').addEventListener('click', closeMock);
  document.getElementById('revealBtn').addEventListener('click', ()=>{
    document.getElementById('mockAnswer').classList.add('show');
  });
  document.getElementById('prevBtn').addEventListener('click', ()=>{
    if(mockIndex>0){ mockIndex--; renderMockPanel(); }
  });
  document.getElementById('nextBtn').addEventListener('click', ()=>{
    if(mockIndex<mockQuestions.length-1){ mockIndex++; renderMockPanel(); }
    else { clearInterval(timerInterval); renderTimeUp(true); }
  });
}

function renderTimeUp(finished){
  const panel = document.getElementById('mockPanel');
  panel.innerHTML = `
    <div class="timeup">
      <h2 class="display">${finished ? "Session complete" : "Time's up"}</h2>
      <p style="color:var(--text-2);margin-bottom:24px;">You covered ${finished ? mockQuestions.length : mockIndex+1} of ${mockQuestions.length} questions. Good pace for a 30-minute round — review the ones you hesitated on.</p>
      <div class="mock-nav">
        <button class="nav-btn" id="closeAfterBtn">Close</button>
        <button class="nav-btn primary" id="restartBtn">Start another round</button>
      </div>
    </div>
  `;
  document.getElementById('closeAfterBtn').addEventListener('click', closeMock);
  document.getElementById('restartBtn').addEventListener('click', startMock);
}

function closeMock(){
  clearInterval(timerInterval);
  document.getElementById('mockOverlay').classList.remove('show');
}

document.getElementById('startMockBtn').addEventListener('click', startMock);
</script>
</body>
</html>
