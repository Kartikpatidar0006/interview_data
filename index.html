<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interview Room — Campus Placement Prep</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0f1115;
    --surface:#171a21;
    --surface-2:#1e222b;
    --border:#2a2f3a;
    --border-soft:#22262f;
    --text:#e8eaf0;
    --text-2:#9aa2b1;
    --text-3:#6b7280;
    --amber:#e0a458;
    --amber-dim:#3a2f20;
    --teal:#4fd1ae;
    --teal-dim:#1c332c;
    --red:#e2665c;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    line-height:1.6;
  }
  h1,h2,h3,.display{font-family:'Space Grotesk',sans-serif;}
  .mono{font-family:'JetBrains Mono',monospace;}

  /* ===== Header ===== */
  header{
    padding:2.5rem 2rem 2rem;
    border-bottom:1px solid var(--border);
    max-width:1180px;
    margin:0 auto;
  }
  .eyebrow{
    font-size:12px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--amber);
    font-weight:600;
    margin-bottom:10px;
  }
  h1{
    font-size:34px;
    font-weight:600;
    margin:0 0 8px;
    letter-spacing:-0.01em;
  }
  .subtitle{
    color:var(--text-2);
    font-size:15px;
    max-width:640px;
  }
  .header-row{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    gap:24px;
    flex-wrap:wrap;
  }
  .mock-btn{
    background:var(--amber);
    color:#241a0c;
    border:none;
    font-family:'Space Grotesk',sans-serif;
    font-weight:600;
    font-size:15px;
    padding:14px 22px;
    border-radius:8px;
    cursor:pointer;
    white-space:nowrap;
    transition:transform 0.1s ease;
  }
  .mock-btn:hover{transform:translateY(-1px);}
  .mock-btn:active{transform:scale(0.98);}

  /* ===== Layout ===== */
  .layout{
    max-width:1180px;
    margin:0 auto;
    display:grid;
    grid-template-columns:230px 1fr;
    gap:0;
  }
  aside{
    padding:2rem 1.5rem 2rem 2rem;
    border-right:1px solid var(--border);
    position:sticky;
    top:0;
    align-self:start;
    height:100vh;
    overflow-y:auto;
  }
  .search{
    width:100%;
    background:var(--surface);
    border:1px solid var(--border);
    color:var(--text);
    padding:10px 12px;
    border-radius:6px;
    font-size:13px;
    margin-bottom:20px;
  }
  .search:focus{outline:none;border-color:var(--amber);}
  .topic-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 10px;
    border-radius:6px;
    cursor:pointer;
    font-size:14px;
    color:var(--text-2);
    margin-bottom:2px;
    border:1px solid transparent;
  }
  .topic-item:hover{background:var(--surface);color:var(--text);}
  .topic-item.active{
    background:var(--amber-dim);
    color:var(--amber);
    border-color:#5a4526;
  }
  .topic-count{
    font-size:11px;
    color:var(--text-3);
    font-family:'JetBrains Mono',monospace;
  }
  .topic-item.active .topic-count{color:var(--amber);}

  main{padding:2rem;}
  .section-title{
    font-size:13px;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color:var(--text-3);
    margin:28px 0 12px;
    font-weight:600;
  }
  .section-title:first-child{margin-top:0;}

  .card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:10px;
    margin-bottom:10px;
    overflow:hidden;
  }
  .q-row{
    display:flex;
    align-items:center;
    gap:12px;
    padding:14px 16px;
    cursor:pointer;
  }
  .q-tag{
    font-size:10px;
    font-family:'JetBrains Mono',monospace;
    color:var(--text-3);
    background:var(--surface-2);
    border:1px solid var(--border-soft);
    padding:2px 7px;
    border-radius:4px;
    flex-shrink:0;
  }
  .q-text{
    font-size:14.5px;
    font-weight:500;
    flex:1;
  }
  .chevron{
    color:var(--text-3);
    font-size:12px;
    transition:transform 0.15s ease;
    flex-shrink:0;
  }
  .card.open .chevron{transform:rotate(90deg);}
  .answer{
    display:none;
    padding:0 16px 18px 16px;
    font-size:14px;
    color:var(--text-2);
    border-top:1px solid var(--border-soft);
    margin-top:0;
  }
  .card.open .answer{display:block;padding-top:14px;}
  .answer .eg{
    margin-top:10px;
    padding:10px 12px;
    background:var(--surface-2);
    border-left:2px solid var(--teal);
    border-radius:0;
    font-size:13px;
    color:var(--text);
  }
  .answer .eg b{color:var(--teal);font-weight:600;}

  .empty{
    color:var(--text-3);
    font-size:14px;
    padding:40px 0;
    text-align:center;
  }

  /* ===== Mock mode overlay ===== */
  .overlay{
    position:fixed;
    inset:0;
    background:rgba(6,7,10,0.92);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:50;
    padding:20px;
  }
  .overlay.show{display:flex;}
  .mock-panel{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:14px;
    width:100%;
    max-width:640px;
    padding:2rem;
  }
  .mock-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:22px;
  }
  .timer-ring-wrap{
    display:flex;
    align-items:center;
    gap:14px;
  }
  .timer-digits{
    font-family:'JetBrains Mono',monospace;
    font-size:28px;
    font-weight:600;
    color:var(--amber);
  }
  .timer-digits.low{color:var(--red);}
  .mock-progress-label{
    font-size:12px;
    color:var(--text-3);
    font-family:'JetBrains Mono',monospace;
  }
  .close-mock{
    background:none;
    border:1px solid var(--border);
    color:var(--text-2);
    width:32px;height:32px;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
  }
  .close-mock:hover{border-color:var(--text-2);color:var(--text);}
  .mock-q-tag{
    display:inline-block;
    font-size:10px;
    font-family:'JetBrains Mono',monospace;
    color:var(--amber);
    background:var(--amber-dim);
    padding:3px 8px;
    border-radius:4px;
    margin-bottom:14px;
  }
  .mock-q{
    font-size:19px;
    font-weight:500;
    font-family:'Space Grotesk',sans-serif;
    margin-bottom:20px;
    min-height:56px;
  }
  .reveal-btn{
    background:var(--surface-2);
    border:1px solid var(--border);
    color:var(--text-2);
    padding:10px 16px;
    border-radius:7px;
    font-size:13px;
    cursor:pointer;
    margin-bottom:16px;
  }
  .reveal-btn:hover{color:var(--text);border-color:var(--text-2);}
  .mock-answer{
    display:none;
    font-size:14px;
    color:var(--text-2);
    background:var(--surface-2);
    padding:14px 16px;
    border-radius:8px;
    margin-bottom:20px;
    border-left:2px solid var(--teal);
  }
  .mock-answer.show{display:block;}
  .mock-answer .eg{margin-top:8px;font-size:13px;}
  .mock-answer .eg b{color:var(--teal);}
  .mock-nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
  }
  .nav-btn{
    flex:1;
    padding:12px;
    border-radius:8px;
    border:1px solid var(--border);
    background:var(--surface-2);
    color:var(--text);
    font-size:14px;
    font-weight:500;
    cursor:pointer;
    font-family:'Inter',sans-serif;
  }
  .nav-btn.primary{
    background:var(--amber);
    color:#241a0c;
    border:none;
    font-weight:600;
  }
  .nav-btn:disabled{opacity:0.35;cursor:not-allowed;}
  .dots{
    display:flex;
    gap:4px;
    margin-top:18px;
    flex-wrap:wrap;
  }
  .dot{
    width:7px;height:7px;
    border-radius:50%;
    background:var(--border);
  }
  .dot.done{background:var(--teal);}
  .dot.current{background:var(--amber);}
  .timeup{
    text-align:center;
    padding:20px 0;
  }
  .timeup h2{color:var(--amber);margin-bottom:8px;}

  @media (max-width:820px){
    .layout{grid-template-columns:1fr;}
    aside{
      position:static;
      height:auto;
      border-right:none;
      border-bottom:1px solid var(--border);
      display:flex;
      flex-direction:column;
    }
    header{padding:2rem 1.25rem 1.5rem;}
    main{padding:1.5rem 1.25rem;}
  }
</style>
</head>
<body>

<header>
  <div class="header-row">
    <div>
      <div class="eyebrow">Campus placement · mock interview prep</div>
      <h1>Interview Room</h1>
      <p class="subtitle">DBMS, OS, CN, DSA, Machine Learning, Deep Learning and Agentic AI — the questions that come up most often, with short, example-backed answers.</p>
    </div>
    <button class="mock-btn" id="startMockBtn">Start 30-min mock interview</button>
  </div>
</header>

<div class="layout">
  <aside>
    <input type="text" class="search" id="searchBox" placeholder="Search a question...">
    <div id="topicList"></div>
  </aside>
  <main id="mainContent"></main>
</div>

<div class="overlay" id="mockOverlay">
  <div class="mock-panel" id="mockPanel"></div>
</div>

<script>
const DATA = [
{topic:"DBMS", q:"What is normalization and why is it used?", a:"Normalization is the process of organizing tables to reduce data redundancy and avoid update, insert, and delete anomalies. It's done by splitting large tables into smaller related ones and defining relationships using foreign keys, typically up to 3NF in interviews.", eg:"A single 'Orders' table storing customer name and address repeated in every row wastes space and risks inconsistency. Splitting it into 'Customers' and 'Orders' tables linked by customer_id removes that duplication."},
{topic:"DBMS", q:"What is the difference between DBMS and RDBMS?", a:"A DBMS stores data as files with no mandatory relationships between them, while an RDBMS stores data in structured tables with rows and columns and enforces relationships through keys and constraints. RDBMS also supports ACID properties and normalization, which plain DBMS does not guarantee.", eg:"File-based storage like a plain text or XML database is a DBMS, whereas MySQL or PostgreSQL, which use tables linked by primary and foreign keys, are RDBMS."},
{topic:"DBMS", q:"Explain the difference between a primary key and a foreign key.", a:"A primary key uniquely identifies each row in its own table and cannot be null, while a foreign key is a column in one table that references the primary key of another table to establish a relationship. A table has exactly one primary key but can have multiple foreign keys.", eg:"In a 'Students' table, student_id is the primary key. In an 'Enrollments' table, student_id appears again as a foreign key pointing back to the Students table."},
{topic:"DBMS", q:"What are the ACID properties of a transaction?", a:"ACID stands for Atomicity, Consistency, Isolation, and Durability. Atomicity ensures a transaction is all-or-nothing, Consistency keeps the database in a valid state before and after, Isolation prevents concurrent transactions from interfering with each other, and Durability guarantees committed data survives system failure.", eg:"During a bank transfer, atomicity ensures that if money is debited from one account but the credit to the other account fails, the whole transaction is rolled back rather than leaving money missing."},
{topic:"DBMS", q:"What are the different types of joins in SQL?", a:"The main types are INNER JOIN, which returns only matching rows from both tables; LEFT JOIN, which returns all rows from the left table plus matches from the right; RIGHT JOIN, the reverse of that; and FULL OUTER JOIN, which returns all rows from both tables, matched or not.", eg:"Joining Employees and Departments with an INNER JOIN shows only employees who have a department assigned, while a LEFT JOIN would also show employees with no department, filling in NULL for department details."},
{topic:"DBMS", q:"What is indexing and how does it improve performance?", a:"An index is a data structure, usually a B-Tree, built on one or more columns that allows the database to locate rows without scanning the entire table. It significantly speeds up SELECT queries and JOINs but adds overhead to INSERT, UPDATE, and DELETE operations since the index must be updated too.", eg:"Searching for a user by email in a table of 10 million rows is slow without an index, since it requires a full table scan; adding an index on the email column turns that into a fast lookup similar to searching a sorted phone book."},
{topic:"DBMS", q:"What are the states of a transaction?", a:"A transaction moves through Active, Partially Committed, Committed, Failed, and Aborted states. It starts Active while executing, reaches Partially Committed after the last operation, becomes Committed once changes are permanently saved, or moves to Failed and then Aborted if an error occurs and changes are rolled back.", eg:"If a transaction transferring funds crashes after debiting one account but before crediting the other, it moves to Failed and then Aborted, and the database rolls back the debit to maintain consistency."},
{topic:"DBMS", q:"What is the difference between DELETE, TRUNCATE, and DROP?", a:"DELETE removes rows one at a time based on a condition, can be rolled back, and fires triggers. TRUNCATE removes all rows at once, is faster since it doesn't log individual row deletions, and generally cannot be rolled back. DROP removes the entire table structure along with its data.", eg:"To clear all rows from a log table but keep using it, you'd use TRUNCATE; if you want to permanently remove the table itself from the schema, you'd use DROP."},

{topic:"OS", q:"What is the difference between a process and a thread?", a:"A process is an independent program in execution with its own memory space, while a thread is a lightweight unit of execution within a process that shares the same memory space with other threads of that process. Because threads share memory, context switching between threads is faster than between processes, but processes are more isolated and safer.", eg:"Opening two separate browser applications creates two processes, while opening multiple tabs within one browser instance can run as multiple threads sharing the same process resources."},
{topic:"OS", q:"What is a deadlock and what are its necessary conditions?", a:"A deadlock is a state where two or more processes are blocked forever, each waiting for a resource held by the other. It requires four conditions simultaneously: mutual exclusion, hold and wait, no preemption, and circular wait.", eg:"Process A holds Printer and waits for Scanner, while Process B holds Scanner and waits for Printer — neither can proceed, forming a circular wait and causing a deadlock."},
{topic:"OS", q:"Explain the difference between paging and segmentation.", a:"Paging divides memory into fixed-size blocks called pages, which eliminates external fragmentation but can cause internal fragmentation. Segmentation divides memory into variable-sized logical units based on the program's structure, like code and data segments, which avoids internal fragmentation but can suffer from external fragmentation.", eg:"Paging is like cutting a book into equal-sized fixed pages regardless of chapter breaks, while segmentation is like dividing the book by chapters, where each chapter can be a different length."},
{topic:"OS", q:"Name common CPU scheduling algorithms and their trade-offs.", a:"Common algorithms include First Come First Served, which is simple but can cause long waiting times; Shortest Job First, which minimizes average waiting time but needs burst time prediction; Round Robin, which is fair and good for time-sharing systems using a fixed time quantum; and Priority Scheduling, which can cause starvation of low-priority processes.", eg:"An operating system handling many interactive users typically uses Round Robin with a small time quantum, like 10-20 milliseconds, so every process gets a fair, responsive share of the CPU."},
{topic:"OS", q:"What is virtual memory and why is it needed?", a:"Virtual memory is a technique that gives each process the illusion of a large, contiguous address space by mapping it to physical memory and disk storage using paging. It allows programs larger than physical RAM to run and provides memory isolation between processes.", eg:"A laptop with 8GB RAM can still run several memory-heavy applications simultaneously because the OS swaps out inactive pages to disk, freeing physical RAM for active processes."},
{topic:"OS", q:"What is the difference between a semaphore and a mutex?", a:"A mutex is a locking mechanism that allows only one thread to access a critical section at a time and can only be released by the thread that locked it. A semaphore is a signaling mechanism with a counter that can allow a fixed number of threads to access a resource simultaneously and can be released by a different thread than the one that acquired it.", eg:"A mutex is like a single bathroom key that only the person holding it can use and return, whereas a counting semaphore is like a parking lot with 5 spaces, where any of several cars can take or leave a spot."},
{topic:"OS", q:"What is context switching?", a:"Context switching is the process of saving the state of a currently running process or thread and loading the saved state of another so the CPU can switch between them. It enables multitasking but adds overhead since no useful work is done during the switch itself.", eg:"When your OS pauses a video render to let you type in a text editor without freezing, it's saving the render process's CPU registers and program counter, then loading the text editor's saved state."},
{topic:"OS", q:"Differentiate between multiprogramming, multitasking, and multiprocessing.", a:"Multiprogramming keeps multiple programs in memory so the CPU always has something to execute, improving utilization but running only one at a time on a single CPU. Multitasking extends this by rapidly switching between tasks to give the illusion of simultaneous execution. Multiprocessing uses multiple CPUs or cores to genuinely execute multiple processes at the same time.", eg:"An old single-core PC running Word and Spotify feels simultaneous due to multitasking, while a modern quad-core laptop can truly run four processes at once through multiprocessing."},

{topic:"CN", q:"Explain the seven layers of the OSI model.", a:"The OSI model has seven layers: Physical for raw bit transmission, Data Link for framing and MAC addressing, Network for logical addressing and routing, Transport for end-to-end delivery and reliability, Session for managing connections, Presentation for data formatting and encryption, and Application for user-facing network services.", eg:"When you load a webpage, HTTP works at the Application layer, TCP handles reliable delivery at the Transport layer, and IP handles routing packets at the Network layer, all working together through the stack."},
{topic:"CN", q:"What is the difference between TCP and UDP?", a:"TCP is a connection-oriented protocol that guarantees reliable, ordered delivery through acknowledgments and retransmission, making it slower but dependable. UDP is connectionless and doesn't guarantee delivery or order, making it faster and lighter with lower overhead.", eg:"File downloads and web browsing use TCP because every byte must arrive correctly, while video calls and online gaming often use UDP since a dropped frame is preferable to a delayed one."},
{topic:"CN", q:"What happens when you type a URL into a browser and press enter?", a:"The browser first checks its cache for a DNS record, or queries a DNS server to resolve the domain name to an IP address. It then establishes a TCP connection with the server via a three-way handshake, performs a TLS handshake if HTTPS is used, sends an HTTP request, and the server responds with the requested resource, which the browser then renders.", eg:"Typing 'google.com' triggers a DNS lookup to find its IP, say 142.250.x.x, then a TCP and TLS handshake with that server before the actual GET request for the homepage is sent."},
{topic:"CN", q:"What is DNS and why is it needed?", a:"DNS, the Domain Name System, translates human-readable domain names into IP addresses that computers use to identify each other on a network. Without it, users would need to remember numeric IP addresses for every website instead of memorable names.", eg:"Instead of typing 142.250.190.14 to reach Google, DNS lets you simply type 'google.com', which is resolved to that IP address behind the scenes."},
{topic:"CN", q:"What is subnetting and why is it used?", a:"Subnetting divides a large network into smaller, logically separated sub-networks by borrowing bits from the host portion of an IP address for the network portion. It improves network performance and security by reducing broadcast traffic and isolating groups of devices.", eg:"A company with the network 192.168.1.0/24 might subnet it into 192.168.1.0/26 and 192.168.1.64/26 to separate the HR and Engineering departments onto different sub-networks."},
{topic:"CN", q:"Explain the TCP three-way handshake.", a:"The three-way handshake establishes a reliable connection before data transfer begins. The client sends a SYN packet to request a connection, the server responds with a SYN-ACK acknowledging the request and sending its own synchronization, and the client replies with an ACK to confirm, after which data transfer can begin.", eg:"It's similar to a phone call: you dial (SYN), the other person picks up and says hello (SYN-ACK), and you respond 'hi, can you hear me' (ACK) before the actual conversation starts."},
{topic:"CN", q:"What is the difference between HTTP and HTTPS?", a:"HTTP transmits data in plain text between client and server, making it vulnerable to interception. HTTPS adds a TLS/SSL encryption layer on top of HTTP, encrypting the data in transit and also verifying the server's identity through certificates.", eg:"Entering a password on an HTTP site sends it as readable plain text over the network, while HTTPS encrypts it so anyone intercepting the traffic only sees scrambled data."},
{topic:"CN", q:"What is the difference between a router, switch, and hub?", a:"A hub simply broadcasts incoming data to all connected devices with no intelligence, causing collisions. A switch intelligently forwards data only to the specific device it's intended for using MAC addresses, operating within a single network. A router connects different networks together and forwards data between them using IP addresses.", eg:"Inside an office, a switch connects all the computers on the same local network, while a router connects that entire office network to the internet."},

{topic:"DSA", q:"What is the difference between an array and a linked list?", a:"An array stores elements in contiguous memory with fixed size and allows O(1) random access by index, but insertion or deletion in the middle is O(n) since elements must shift. A linked list stores elements as nodes connected via pointers, allowing O(1) insertion or deletion once the position is known, but access requires O(n) traversal since there's no direct indexing.", eg:"Inserting a new song in the middle of a linked-list-based playlist just updates a couple of pointers, while doing the same in an array-based list requires shifting every subsequent song over by one position."},
{topic:"DSA", q:"What are the time complexities of common data structure operations?", a:"Arrays give O(1) access and O(n) insertion/deletion. Linked lists give O(n) access and O(1) insertion/deletion at a known position. Hash tables give average O(1) insertion, deletion, and lookup. Balanced binary search trees give O(log n) for search, insert, and delete.", eg:"Looking up whether a username already exists is best done with a hash set, giving average O(1) lookup, rather than scanning an array which would take O(n)."},
{topic:"DSA", q:"What is a Binary Search Tree and what are its properties?", a:"A Binary Search Tree is a binary tree where, for every node, all values in its left subtree are smaller and all values in its right subtree are larger. This property allows search, insertion, and deletion in O(log n) time on average when the tree is balanced, but degrades to O(n) if it becomes skewed.", eg:"Searching for the value 42 in a BST starts at the root and moves left or right at each node depending on whether 42 is smaller or larger, similar to a binary search on a sorted array."},
{topic:"DSA", q:"What is the difference between BFS and DFS?", a:"BFS, Breadth-First Search, explores a graph level by level using a queue, making it ideal for finding the shortest path in an unweighted graph. DFS, Depth-First Search, explores as far as possible along one branch before backtracking, typically using a stack or recursion, and is useful for tasks like detecting cycles or exploring all paths.", eg:"To find the shortest number of connections between two people on a social network, BFS is used, while DFS would be a better fit for checking if a maze has any path at all from start to end."},
{topic:"DSA", q:"What is Dynamic Programming and when is it used?", a:"Dynamic Programming solves complex problems by breaking them into overlapping subproblems, solving each subproblem once, and storing the result to avoid recomputation, either through memoization (top-down) or tabulation (bottom-up). It's used when a problem has optimal substructure and overlapping subproblems.", eg:"Calculating the nth Fibonacci number naively takes exponential time due to repeated recalculation, but storing previously computed values in an array brings it down to O(n) time."},
{topic:"DSA", q:"What is the difference between a stack and a queue?", a:"A stack follows Last In First Out order, so the most recently added element is removed first, with push and pop operations both at one end. A queue follows First In First Out order, where elements are added at the rear and removed from the front.", eg:"The browser's back button behaves like a stack, undoing the most recently visited page first, while a printer's job queue processes print requests in the order they were submitted."},
{topic:"DSA", q:"What is hashing and how are collisions handled?", a:"Hashing maps a key to an index in a table using a hash function, allowing average O(1) insertion and lookup. When two different keys map to the same index, a collision occurs, which is typically resolved through chaining, where each index holds a linked list of entries, or open addressing, where the algorithm probes for the next free slot.", eg:"If both 'apple' and 'grape' hash to index 3 in a hash table using chaining, both entries are stored as a small linked list at that index and searched linearly when looked up."},
{topic:"DSA", q:"Explain how QuickSort and MergeSort work.", a:"QuickSort picks a pivot element, partitions the array so smaller elements go left and larger go right, then recursively sorts each partition, giving average O(n log n) time but worst-case O(n squared). MergeSort divides the array in half recursively until single elements remain, then merges them back in sorted order, guaranteeing O(n log n) in all cases but requiring extra space.", eg:"MergeSort is preferred for sorting linked lists or when stability and guaranteed performance matter, while QuickSort is often faster in practice for arrays due to better cache locality and in-place partitioning."},

{topic:"ML", q:"What is the difference between supervised and unsupervised learning?", a:"Supervised learning trains a model on labeled data, where each input has a known correct output, to predict outcomes on new data. Unsupervised learning works with unlabeled data and finds hidden patterns or groupings without any predefined output.", eg:"Predicting house prices from labeled historical sales data is supervised learning, while grouping customers into segments based on purchase behavior without predefined categories is unsupervised learning via clustering."},
{topic:"ML", q:"What is the difference between overfitting and underfitting?", a:"Overfitting happens when a model learns the training data too well, including its noise, resulting in high training accuracy but poor generalization to new data. Underfitting happens when a model is too simple to capture the underlying pattern, leading to poor performance on both training and test data.", eg:"A very deep decision tree that perfectly classifies every training example but fails on new customers is overfitting, while a straight line fit to clearly curved data is underfitting."},
{topic:"ML", q:"Explain the bias-variance tradeoff.", a:"Bias is the error from overly simplistic assumptions in the model, leading to underfitting, while variance is the error from being overly sensitive to small fluctuations in training data, leading to overfitting. The goal is to find a balance where both are minimized so the model generalizes well.", eg:"A linear model on non-linear data has high bias, while a very high-degree polynomial fit to the same data has high variance; a moderately complex model with regularization often strikes the right balance."},
{topic:"ML", q:"What is a confusion matrix?", a:"A confusion matrix is a table that summarizes a classification model's performance by comparing predicted labels against actual labels, broken into True Positives, True Negatives, False Positives, and False Negatives. It's the basis for computing metrics like precision, recall, and F1-score.", eg:"In a spam detector, a False Positive means a genuine email was wrongly marked as spam, while a False Negative means an actual spam email slipped into the inbox undetected."},
{topic:"ML", q:"What is cross-validation and why is it used?", a:"Cross-validation is a technique for evaluating model performance by splitting the data into multiple folds, training on some folds and validating on the remaining one, then rotating through all folds. It gives a more reliable estimate of how the model will generalize compared to a single train-test split.", eg:"In 5-fold cross-validation, the dataset is split into 5 parts; the model trains on 4 parts and validates on the 5th, repeating this 5 times so every part is used for validation exactly once."},
{topic:"ML", q:"What is the difference between precision and recall?", a:"Precision measures what fraction of positive predictions were actually correct, calculated as True Positives divided by all Predicted Positives. Recall measures what fraction of actual positives the model successfully identified, calculated as True Positives divided by all Actual Positives. There's often a tradeoff between the two.", eg:"In cancer detection, recall is prioritized over precision because missing an actual cancer case (a False Negative) is far more costly than a false alarm that leads to further testing."},
{topic:"ML", q:"What is regularization and what's the difference between L1 and L2?", a:"Regularization adds a penalty term to the loss function to discourage overly complex models and reduce overfitting. L1 regularization, or Lasso, adds the absolute value of coefficients and can shrink some coefficients exactly to zero, effectively performing feature selection. L2 regularization, or Ridge, adds the squared value of coefficients and shrinks them smoothly toward zero without eliminating them.", eg:"When a dataset has hundreds of features but only a few are truly useful, L1 regularization can automatically zero out the irrelevant ones, producing a simpler, more interpretable model."},
{topic:"ML", q:"Explain how gradient descent works.", a:"Gradient descent is an optimization algorithm that iteratively adjusts model parameters in the direction that reduces the loss function, guided by the negative of the gradient. The learning rate controls the step size; too large can overshoot the minimum, and too small makes convergence slow.", eg:"Imagine standing on a hill in fog and wanting to reach the bottom: at each step you feel the slope under your feet and move in the steepest downhill direction, which is exactly what gradient descent does mathematically."},

{topic:"DL", q:"What is a neural network at a high level?", a:"A neural network is a computational model made of layers of interconnected nodes, or neurons, inspired loosely by the brain. Each connection has a weight, and each neuron applies an activation function to a weighted sum of its inputs, with the network learning by adjusting these weights through backpropagation to minimize prediction error.", eg:"A simple network for digit recognition takes pixel values as input, passes them through hidden layers that learn features like edges and curves, and outputs a probability for each digit 0 through 9."},
{topic:"DL", q:"What are activation functions and why are they needed?", a:"Activation functions introduce non-linearity into a neural network, allowing it to learn complex patterns instead of just linear relationships. Common ones include ReLU, which outputs the input directly if positive and zero otherwise, Sigmoid, which squashes values between 0 and 1, and Softmax, used for multi-class output probabilities.", eg:"Without any activation function, stacking many layers would mathematically collapse into a single linear transformation, so a deep network with only linear layers would perform no better than a single-layer model."},
{topic:"DL", q:"What is backpropagation?", a:"Backpropagation is the algorithm used to train neural networks by computing the gradient of the loss function with respect to each weight, working backward from the output layer to the input layer using the chain rule. These gradients are then used by an optimizer like gradient descent to update the weights.", eg:"If a network wrongly predicts a cat image as a dog, backpropagation calculates how much each weight contributed to that error and adjusts them slightly in the direction that would have produced the correct prediction."},
{topic:"DL", q:"What is the difference between CNN and RNN?", a:"A Convolutional Neural Network uses filters that slide over input data to detect spatial patterns like edges and textures, making it well-suited for image data. A Recurrent Neural Network maintains a hidden state that carries information across time steps, making it suited for sequential data like text or time series, though it can struggle with long sequences.", eg:"CNNs are used for image classification tasks like identifying objects in a photo, while RNNs and their variants like LSTM are used for tasks like predicting the next word in a sentence."},
{topic:"DL", q:"What is the vanishing gradient problem?", a:"The vanishing gradient problem occurs in deep networks when gradients become extremely small as they're backpropagated through many layers, causing earlier layers to learn very slowly or stop learning altogether. It's commonly caused by activation functions like Sigmoid that squash gradients into a small range.", eg:"In a 50-layer network using Sigmoid activations, the gradient reaching the first few layers can become so tiny that those layers barely update, which is one reason ReLU and architectures like ResNet with skip connections became popular."},
{topic:"DL", q:"What is dropout and why is it used?", a:"Dropout is a regularization technique where a random fraction of neurons is temporarily disabled during each training iteration, forcing the network to not rely too heavily on any single neuron. This reduces overfitting and improves generalization to unseen data.", eg:"With a dropout rate of 0.5 in a hidden layer, roughly half of its neurons are randomly turned off in each training pass, which is similar to training many smaller networks and averaging their behavior."},
{topic:"DL", q:"What is batch normalization?", a:"Batch normalization normalizes the inputs of each layer within a mini-batch to have a stable mean and variance during training, which speeds up convergence and allows higher learning rates. It also acts as a mild regularizer, reducing the need for other techniques like dropout in some architectures.", eg:"Without batch normalization, if input values to a layer keep shifting in scale as earlier layers update, training can become slow and unstable; normalizing them keeps the learning process smoother and faster."},
{topic:"DL", q:"What is the Transformer architecture, in simple terms?", a:"The Transformer is a neural network architecture built around the self-attention mechanism, which lets the model weigh the importance of every other word in a sequence when processing a given word, rather than processing tokens strictly in order like an RNN. This allows for parallel processing and better handling of long-range dependencies, and it's the foundation of models like GPT and BERT.", eg:"In the sentence 'the animal didn't cross the street because it was too tired', self-attention helps the model figure out that 'it' refers to 'the animal' by directly attending to that word regardless of distance."},

{topic:"Agentic AI", q:"What is an AI agent?", a:"An AI agent is a system built around a language model that can perceive its environment or task, reason about what steps to take, and take actions using tools, rather than just generating a single text response. It typically operates in a loop of observing, reasoning, and acting until a goal is achieved.", eg:"A customer support agent that reads a ticket, decides it needs order details, calls an internal API to fetch them, and then drafts a reply is acting as an agent rather than a simple chatbot."},
{topic:"Agentic AI", q:"What is the difference between an LLM and an AI agent?", a:"An LLM is a language model that takes text input and generates text output in a single pass, with no memory of actions or ability to interact with external systems on its own. An agent wraps an LLM with the ability to plan multi-step tasks, call external tools, retain state across steps, and decide when a goal has been achieved.", eg:"Asking an LLM directly 'what's the weather today' will produce a guess or a refusal, but an agent can call a weather API tool, get the real result, and use it to answer accurately."},
{topic:"Agentic AI", q:"What is RAG, Retrieval-Augmented Generation?", a:"RAG is a technique where relevant documents or data are retrieved from an external knowledge source, usually a vector database, and passed to the language model as context before it generates a response. This grounds the model's output in up-to-date or domain-specific information rather than relying solely on what it learned during training.", eg:"A company chatbot answering questions about internal HR policy uses RAG to first retrieve the relevant policy document from a database, then generates an answer based on that retrieved text instead of guessing."},
{topic:"Agentic AI", q:"What is function calling or tool use in the context of agents?", a:"Function calling, or tool use, is a capability where a language model can output a structured request to call an external function, such as an API or database query, with specific parameters, and then use the returned result to continue its response. It allows the model to go beyond generating text and actually perform real-world actions or fetch real-time data.", eg:"When asked to book a meeting, an agent can call a 'create_calendar_event' function with the date, time, and attendees as parameters, and the calendar system executes the actual booking."},
{topic:"Agentic AI", q:"What is the ReAct pattern in agents?", a:"ReAct, short for Reasoning and Acting, is a prompting pattern where the model alternates between generating a reasoning trace explaining its thought process and taking an action, such as calling a tool, then observing the result before reasoning again. This interleaving improves reliability on multi-step tasks compared to asking the model to act without explaining its reasoning.", eg:"For the question 'what is the population of the capital of France', a ReAct agent might reason 'I need to find the capital of France first', search and find 'Paris', then reason again and search for Paris's population before answering."},
{topic:"Agentic AI", q:"What is memory in AI agents?", a:"Memory in agents refers to the ability to retain and recall information across steps or sessions, beyond the model's fixed context window. Short-term memory typically holds the current conversation or task state, while long-term memory stores information persistently, often in a vector database, for recall in future interactions.", eg:"An agent that remembers a user's dietary restrictions across separate conversations weeks apart is relying on long-term memory rather than just the current chat context."},
{topic:"Agentic AI", q:"What are multi-agent systems?", a:"A multi-agent system involves multiple specialized AI agents collaborating, each handling a distinct sub-task or role, coordinated by a central orchestrator or through direct communication between agents. This division of labor can improve performance on complex tasks compared to relying on a single general-purpose agent.", eg:"A research task might use one agent to search the web, another to summarize findings, and a third to fact-check and compile the final report, all coordinated by a manager agent."},
{topic:"Agentic AI", q:"What are the main challenges in deploying agentic AI systems?", a:"Key challenges include reliability, since errors can compound across multiple steps in a long task; latency and cost, since agents may make many model and tool calls per task; safety, ensuring agents don't take harmful or unintended actions when given autonomy; and evaluation, since it's harder to measure success on open-ended multi-step tasks than on single-turn responses.", eg:"An agent automating expense approvals could compound a small misreading of one receipt into an incorrect multi-step approval chain, so most production systems add human checkpoints before high-stakes actions."},

{topic:"DBMS", q:"What is the difference between a clustered and a non-clustered index?", a:"A clustered index determines the actual physical order in which rows are stored on disk, so a table can have only one. A non-clustered index is a separate structure that stores pointers back to the actual rows, so a table can have several of them.", eg:"A clustered index on customer_id physically sorts the entire table by that column, while a non-clustered index on email just keeps a lookup structure pointing to where each row actually lives."},
{topic:"DBMS", q:"What is a view in SQL?", a:"A view is a virtual table created by a stored SQL query that presents data from one or more underlying tables without physically storing a copy of the data. It simplifies complex queries and can restrict access to specific columns or rows.", eg:"A view called ActiveCustomers might combine and filter the Customers table to show only rows where status is 'active', so users query the view instead of writing that filter every time."},
{topic:"DBMS", q:"What is a stored procedure?", a:"A stored procedure is a precompiled block of SQL statements saved in the database that can be executed by calling its name, optionally passing parameters. It reduces network traffic, improves performance through precompilation, and centralizes business logic.", eg:"A stored procedure named TransferFunds could take sender_id, receiver_id, and amount as parameters and internally handle the debit, credit, and validation in one call instead of the application sending multiple separate queries."},
{topic:"DBMS", q:"What is denormalization and when would you use it?", a:"Denormalization is the intentional process of adding redundant data back into normalized tables to reduce the number of joins needed and improve read performance. It's typically used in read-heavy systems like reporting or analytics where query speed matters more than storage efficiency.", eg:"A reporting dashboard might store a customer's name directly in the Orders table, duplicating data that already exists in the Customers table, just to avoid an expensive join on every report query."},
{topic:"DBMS", q:"What is the difference between UNION and UNION ALL?", a:"UNION combines the results of two queries and removes duplicate rows, which requires extra processing to sort and de-duplicate. UNION ALL combines the results without removing duplicates, making it faster since it skips that de-duplication step.", eg:"Combining a list of current employees and past employees with UNION would remove anyone appearing in both lists, while UNION ALL would keep both entries even if they're identical."},
{topic:"DBMS", q:"What are aggregate functions in SQL?", a:"Aggregate functions perform a calculation on a set of rows and return a single summary value, commonly used with GROUP BY. Common examples are COUNT, SUM, AVG, MIN, and MAX.", eg:"To find the total revenue per region, you'd use SUM(revenue) GROUP BY region, which collapses all rows for each region into one summed value."},
{topic:"DBMS", q:"What is a trigger in a database?", a:"A trigger is a piece of code that automatically executes in response to a specific event on a table, such as an INSERT, UPDATE, or DELETE, without being explicitly called by the application. It's commonly used for auditing, enforcing business rules, or maintaining derived data.", eg:"A trigger on the Employees table could automatically insert a record into an AuditLog table every time a salary column is updated, capturing who changed it and when."},
{topic:"DBMS", q:"What is the difference between WHERE and HAVING clauses?", a:"WHERE filters individual rows before any grouping or aggregation happens, and cannot be used with aggregate functions. HAVING filters groups after GROUP BY has been applied, and is used specifically to filter based on aggregate results.", eg:"To find departments with more than 10 employees, you'd use HAVING COUNT(*) > 10 after grouping by department, since WHERE cannot filter on an aggregate like COUNT."},
{topic:"DBMS", q:"What is a composite key?", a:"A composite key is a primary key made up of two or more columns that together uniquely identify a row, even though no single column among them is unique on its own. It's commonly used in junction tables that represent many-to-many relationships.", eg:"In an Enrollments table linking Students and Courses, the combination of student_id and course_id together forms a composite key, since a student can enroll in many courses and vice versa."},
{topic:"DBMS", q:"What is referential integrity?", a:"Referential integrity is a database constraint that ensures a foreign key value in one table always corresponds to an existing primary key value in the referenced table, preventing orphaned or inconsistent records. Databases enforce it by rejecting or cascading operations that would break this link.", eg:"If an Orders table has a foreign key referencing Customers, referential integrity prevents deleting a customer who still has existing orders, unless a cascade rule is explicitly defined."},
{topic:"DBMS", q:"What is the CAP theorem?", a:"The CAP theorem states that a distributed database can only guarantee two out of three properties at the same time: Consistency, meaning every read gets the latest write; Availability, meaning every request gets a response; and Partition tolerance, meaning the system keeps working despite network failures between nodes.", eg:"During a network partition, a system like Cassandra chooses Availability and Partition tolerance over strict Consistency, temporarily allowing reads that may return slightly stale data."},
{topic:"DBMS", q:"What is the difference between OLTP and OLAP systems?", a:"OLTP, Online Transaction Processing, handles a high volume of short, simple read/write transactions typical of day-to-day operations, prioritizing speed and consistency. OLAP, Online Analytical Processing, handles complex read-heavy queries over large historical datasets, typically used for reporting and business intelligence.", eg:"A banking app processing individual withdrawals and deposits is an OLTP system, while a data warehouse analyzing five years of transaction trends for a quarterly report is an OLAP system."},

{topic:"OS", q:"What is thrashing?", a:"Thrashing occurs when a system spends more time swapping pages in and out of memory than actually executing processes, usually because too many processes are competing for too little physical memory. It causes a dramatic drop in overall system performance despite the CPU appearing busy.", eg:"If a machine with limited RAM tries to run too many heavy applications at once, it may constantly page-fault and swap, so opening a new browser tab can take minutes instead of seconds."},
{topic:"OS", q:"What is a race condition?", a:"A race condition occurs when two or more threads or processes access shared data concurrently, and the final outcome depends on the unpredictable timing of their execution. It's typically fixed using synchronization mechanisms like locks or semaphores to ensure only one thread modifies the shared data at a time.", eg:"If two threads both read a bank balance of 100, each add 50, and write back, the final balance might incorrectly be 150 instead of 200, since one update overwrote the other."},
{topic:"OS", q:"What is the difference between preemptive and non-preemptive scheduling?", a:"In preemptive scheduling, the OS can forcibly take the CPU away from a running process to give it to another, typically a higher-priority one, even if the current process hasn't finished. In non-preemptive scheduling, once a process gets the CPU, it keeps it until it finishes or voluntarily gives it up.", eg:"Round Robin is preemptive since a running process is interrupted once its time quantum expires, while First Come First Served is non-preemptive since a process runs to completion once started."},
{topic:"OS", q:"What is a page fault?", a:"A page fault occurs when a process tries to access a page that is marked as not currently loaded in physical memory, forcing the OS to fetch it from disk. It's a normal part of virtual memory management but excessive page faults can severely degrade performance.", eg:"When you open a large application for the first time, several of its code pages aren't in RAM yet, so accessing them triggers page faults as the OS loads them from disk into memory."},
{topic:"OS", q:"What is Belady's Anomaly?", a:"Belady's Anomaly is a counterintuitive phenomenon in page replacement where increasing the number of available memory frames can actually increase the number of page faults, rather than decrease it. It's notably observed with the FIFO page replacement algorithm, but not with optimal or LRU algorithms.", eg:"A process might experience 9 page faults with 3 frames using FIFO, but surprisingly 10 page faults with 4 frames under the same reference string, which is exactly what Belady's Anomaly describes."},
{topic:"OS", q:"What is the difference between internal and external fragmentation?", a:"Internal fragmentation occurs when a fixed-size memory block allocated to a process is larger than what the process actually needs, wasting the unused space inside that block. External fragmentation occurs when free memory is scattered in small, non-contiguous chunks, so even though total free memory is enough, no single block is large enough to satisfy a request.", eg:"Paging can cause internal fragmentation if a process only fills half of its last page, while variable-sized partition allocation can leave scattered gaps between allocated processes, causing external fragmentation."},
{topic:"OS", q:"What is a critical section?", a:"A critical section is a segment of code where a process or thread accesses shared resources, such as shared memory or variables, that must not be concurrently accessed by more than one thread at a time. Solutions to the critical section problem must guarantee mutual exclusion, progress, and bounded waiting.", eg:"The line of code that updates a shared counter variable is a critical section, and it's typically wrapped with a lock so only one thread can execute it at any given moment."},
{topic:"OS", q:"What is starvation and how does aging solve it?", a:"Starvation occurs when a process is perpetually denied the CPU or a resource because other processes are continuously prioritized over it, often in priority-based scheduling. Aging solves this by gradually increasing the priority of processes that have been waiting for a long time, eventually ensuring they get scheduled.", eg:"In a strict priority scheduler, a low-priority background task might never run if high-priority tasks keep arriving, but aging would slowly boost its priority until it eventually gets CPU time."},
{topic:"OS", q:"What is the difference between kernel mode and user mode?", a:"Kernel mode is a privileged CPU mode where the operating system has full, unrestricted access to hardware and system resources. User mode is a restricted mode where regular applications run with limited privileges, and any hardware access must go through the OS via system calls.", eg:"A text editor runs in user mode and cannot directly write to disk hardware; instead, it makes a system call that switches the CPU into kernel mode to safely perform the actual disk write."},
{topic:"OS", q:"What is a system call?", a:"A system call is the mechanism through which a user-mode program requests a service from the operating system's kernel, such as file access, process creation, or network communication. It acts as the controlled interface between applications and privileged hardware operations.", eg:"When a program wants to open a file, it invokes a system call like open(), which switches the CPU to kernel mode, performs the file access safely, and returns control back to the program."},
{topic:"OS", q:"Explain the producer-consumer problem.", a:"The producer-consumer problem is a classic synchronization problem where a producer process generates data and places it into a shared buffer, while a consumer process removes data from that buffer, and both must be synchronized so the producer doesn't overfill a full buffer and the consumer doesn't read from an empty one. It's typically solved using semaphores or condition variables to coordinate access.", eg:"A video streaming app buffers downloaded chunks in a queue; the download thread is the producer filling the queue, and the playback thread is the consumer draining it, synchronized so playback never reads past what's downloaded."},
{topic:"OS", q:"What is spooling?", a:"Spooling, Simultaneous Peripheral Operations On-Line, is a technique where data intended for a slow device like a printer is temporarily stored in a buffer or disk queue, allowing the CPU or application to continue working without waiting for the slow device to finish. Multiple jobs can be queued and processed in order by the device independently.", eg:"When you send several documents to print, they're spooled to a queue on disk, letting you keep working immediately while the printer processes them one by one in the background."},

{topic:"CN", q:"What is the difference between a MAC address and an IP address?", a:"A MAC address is a physical, hardware-assigned address burned into a network interface card, used for communication within the same local network at the Data Link layer. An IP address is a logical address assigned by a network administrator or DHCP, used for identifying devices and routing across different networks at the Network layer.", eg:"Your laptop's Wi-Fi card MAC address never changes regardless of which network you join, but its IP address changes depending on which Wi-Fi network you're connected to."},
{topic:"CN", q:"What is NAT, Network Address Translation?", a:"NAT is a technique that allows multiple devices on a private local network to share a single public IP address when communicating with the internet, by translating private IP addresses to the public one and tracking the mapping. It conserves public IPv4 addresses and adds a layer of privacy for internal devices.", eg:"All the devices in a home, like a laptop, phone, and smart TV, use private IPs like 192.168.1.x internally, but the router's NAT translates their traffic to a single public IP when it reaches the internet."},
{topic:"CN", q:"What is a firewall and what does it do?", a:"A firewall is a network security system that monitors and controls incoming and outgoing traffic based on predefined security rules, acting as a barrier between a trusted internal network and untrusted external networks. It can operate at the packet level, filtering based on IP and port, or inspect traffic more deeply at the application level.", eg:"A firewall might be configured to block all incoming traffic except on port 443 for HTTPS, preventing unauthorized access attempts on other ports while still allowing normal web traffic."},
{topic:"CN", q:"What is the difference between IPv4 and IPv6?", a:"IPv4 uses a 32-bit address space, giving around 4.3 billion unique addresses, which has become insufficient for the number of internet-connected devices today. IPv6 uses a 128-bit address space, providing an effectively unlimited number of addresses, along with improvements like simplified headers and built-in support for security.", eg:"An IPv4 address looks like 192.168.1.1, while an IPv6 address looks like 2001:0db8:85a3::8a2e:0370:7334, reflecting its much larger address space."},
{topic:"CN", q:"What is ARP, Address Resolution Protocol?", a:"ARP is a protocol used to map a known IP address to its corresponding MAC address within a local network, since devices ultimately need the MAC address to deliver frames at the Data Link layer. A device broadcasts an ARP request asking who owns a given IP, and the owning device responds with its MAC address.", eg:"Before your computer can send a packet to another device on the same Wi-Fi network, it uses ARP to discover that device's MAC address if it isn't already cached locally."},
{topic:"CN", q:"What is a proxy server?", a:"A proxy server acts as an intermediary between a client and the internet, forwarding requests on the client's behalf and returning the response, which can provide benefits like caching, anonymity, content filtering, or load distribution. Unlike NAT, a proxy operates at the application layer and is aware of the actual requests being made.", eg:"A company might route all employee web traffic through a proxy server to block access to certain websites and cache frequently visited pages to reduce bandwidth usage."},
{topic:"CN", q:"What is the difference between bandwidth and latency?", a:"Bandwidth is the maximum amount of data that can be transmitted over a network connection in a given time, usually measured in Mbps or Gbps. Latency is the time delay for a piece of data to travel from source to destination, usually measured in milliseconds, and is unaffected by how much bandwidth is available.", eg:"A satellite internet connection can have high bandwidth but high latency due to the physical distance signals travel to space and back, which is why it can still feel laggy during video calls despite fast download speeds."},
{topic:"CN", q:"What is congestion control?", a:"Congestion control refers to techniques used by protocols like TCP to prevent too much data from being injected into a network faster than it can handle, which would otherwise cause packet loss and delays. TCP achieves this by dynamically adjusting its sending rate based on detected network conditions, such as through slow start and congestion avoidance algorithms.", eg:"When TCP detects packet loss, indicating congestion, it reduces its congestion window and sending rate, then gradually increases it again as the network proves it can handle more traffic."},
{topic:"CN", q:"What is the difference between circuit switching and packet switching?", a:"Circuit switching establishes a dedicated communication path between two endpoints for the entire duration of the session, reserving resources even during idle periods, as used in traditional telephone networks. Packet switching breaks data into packets that are routed independently and can take different paths, sharing network resources more efficiently, which is how the internet operates.", eg:"A traditional landline call reserves a dedicated circuit for the whole conversation, while sending a WhatsApp message breaks it into packets that may travel through completely different routers before reassembling at the destination."},
{topic:"CN", q:"What is a VPN and how does it work?", a:"A VPN, Virtual Private Network, creates an encrypted tunnel between a user's device and a remote server, routing all traffic through that tunnel so it appears to originate from the VPN server's location and is protected from eavesdropping on the local network. It's commonly used for privacy, bypassing geo-restrictions, and securely accessing a private company network remotely.", eg:"An employee working from a coffee shop can use a company VPN to securely access internal systems as if they were physically on the office network, while their traffic remains encrypted even over public Wi-Fi."},
{topic:"CN", q:"What is the purpose of ports in networking?", a:"A port is a logical number used alongside an IP address to identify a specific process or service running on a device, allowing multiple network applications to operate simultaneously on the same machine without conflict. Well-known ports are reserved for standard services, such as port 80 for HTTP and port 443 for HTTPS.", eg:"A single web server with one IP address can run a website on port 80 and an SSH service on port 22 at the same time, since incoming traffic is directed to the correct application based on the port number."},
{topic:"CN", q:"What is multiplexing in networking?", a:"Multiplexing is the technique of combining multiple signals or data streams so they can be transmitted together over a single shared communication channel, then separated again at the receiving end through demultiplexing. It improves the efficient use of available bandwidth.", eg:"At the Transport layer, TCP and UDP use port numbers to multiplex data from multiple applications on a device into a single network connection, then demultiplex incoming data back to the correct application."},

{topic:"DSA", q:"What is a heap and how does heapsort work?", a:"A heap is a complete binary tree that satisfies the heap property, where in a max-heap every parent node is greater than or equal to its children, and in a min-heap every parent is smaller. Heapsort builds a max-heap from the array, then repeatedly swaps the root, the maximum element, with the last element and reduces the heap size, achieving O(n log n) time in all cases.", eg:"A priority queue used to always fetch the most urgent task first is typically implemented using a heap, since it gives O(log n) insertion and O(1) access to the maximum or minimum element."},
{topic:"DSA", q:"What is the difference between recursion and iteration?", a:"Recursion solves a problem by having a function call itself with a smaller subproblem until it reaches a base case, using the call stack to manage state. Iteration solves a problem using loops that repeat a set of instructions, without the overhead of function calls, generally making it more memory-efficient for simple repetitive tasks.", eg:"Calculating factorial recursively calls factorial(n-1) until it hits the base case factorial(0), while an iterative version simply multiplies numbers in a for loop from 1 to n without any extra function call overhead."},
{topic:"DSA", q:"What is a graph and how is it represented?", a:"A graph is a data structure consisting of a set of vertices, or nodes, connected by edges, which can be directed or undirected, weighted or unweighted. It's commonly represented either as an adjacency matrix, a 2D array indicating which vertices are connected, or an adjacency list, where each vertex stores a list of its neighbors.", eg:"A social network is naturally modeled as a graph where users are vertices and friendships are edges, typically stored as an adjacency list since most users are only connected to a small subset of all users, making it more space-efficient than a matrix."},
{topic:"DSA", q:"Why does binary search run in O(log n) time?", a:"Binary search works on a sorted array by repeatedly comparing the target to the middle element and eliminating half of the remaining search space at each step. Since the search space is halved every iteration, the number of steps needed to reduce it to a single element is log base 2 of n, giving O(log n) time complexity.", eg:"Searching for a number in a sorted array of 1,000,000 elements takes at most about 20 comparisons with binary search, compared to up to 1,000,000 comparisons with a linear scan."},
{topic:"DSA", q:"What is a Trie and what is it used for?", a:"A Trie, or prefix tree, is a tree-like data structure used to store strings, where each node represents a character and paths from the root spell out prefixes shared among stored words. It enables fast prefix-based searches and autocomplete, typically in O(L) time where L is the length of the string, regardless of how many words are stored.", eg:"A search engine's autocomplete feature uses a Trie to quickly return all words that start with 'inter', by simply traversing down the branch representing that prefix rather than scanning every stored word."},
{topic:"DSA", q:"What is the difference between a greedy algorithm and dynamic programming?", a:"A greedy algorithm makes the locally optimal choice at each step, hoping it leads to a globally optimal solution, and never reconsiders past decisions. Dynamic programming considers all possible choices for subproblems and combines their optimal solutions, which is necessary when the greedy choice at one step can affect what's optimal later.", eg:"Giving minimum coins for change using standard denominations often works greedily by always picking the largest coin, but for irregular denominations that approach can fail, requiring dynamic programming to guarantee the true minimum."},
{topic:"DSA", q:"What is topological sorting?", a:"Topological sorting produces a linear ordering of vertices in a Directed Acyclic Graph such that for every directed edge from vertex A to vertex B, A appears before B in the ordering. It's only possible on graphs with no cycles and is commonly done using DFS or Kahn's algorithm based on in-degree.", eg:"Course scheduling, where some courses have prerequisites, uses topological sort to determine a valid order to take courses so that every prerequisite is completed before the course that depends on it."},
{topic:"DSA", q:"What is the sliding window technique?", a:"The sliding window technique maintains a subset of elements, or a window, over a portion of an array or string, and efficiently adjusts its boundaries as it moves across the data instead of recomputing from scratch, often turning an O(n squared) brute-force approach into O(n).", eg:"Finding the maximum sum of any 5 consecutive elements in an array can be done by sliding a window of size 5, subtracting the element that leaves and adding the one that enters, rather than resumming all 5 elements each time."},
{topic:"DSA", q:"What is the two-pointer technique?", a:"The two-pointer technique uses two indices that traverse a data structure, often from opposite ends or at different speeds, to solve problems in linear time that might otherwise require nested loops. It's especially effective on sorted arrays or linked lists.", eg:"To check if a sorted array has two numbers that sum to a target value, one pointer starts at the beginning and another at the end, moving inward based on whether the current sum is too high or too low, solving it in O(n) instead of O(n squared)."},
{topic:"DSA", q:"What is the difference between time complexity and space complexity?", a:"Time complexity measures how the running time of an algorithm grows relative to the size of its input, while space complexity measures how much additional memory it requires relative to input size. An algorithm can be optimized for one at the cost of the other, which is a common tradeoff in algorithm design.", eg:"Memoized recursive Fibonacci trades additional space, an array to store past results, for a big improvement in time complexity, dropping from exponential to linear time."},
{topic:"DSA", q:"What is a self-balancing tree like AVL, and why is it needed?", a:"An AVL tree is a self-balancing binary search tree that automatically performs rotations whenever an insertion or deletion causes the height difference between left and right subtrees of any node to exceed one. This guarantees O(log n) height at all times, preventing the tree from degrading into a skewed, linked-list-like structure that would make operations O(n).", eg:"Inserting sorted data like 1, 2, 3, 4, 5 into a plain BST creates a completely skewed tree with O(n) search time, but an AVL tree would automatically rotate to stay balanced and keep search at O(log n)."},
{topic:"DSA", q:"Explain Dijkstra's algorithm.", a:"Dijkstra's algorithm finds the shortest path from a source vertex to all other vertices in a weighted graph with non-negative edge weights. It repeatedly selects the unvisited vertex with the smallest known distance, updates the distances of its neighbors if a shorter path is found through it, and marks it as visited, typically using a priority queue for efficiency.", eg:"A GPS navigation app uses an algorithm similar to Dijkstra's to find the shortest driving route between two locations, treating intersections as vertices and road segments as weighted edges based on distance or time."},

{topic:"ML", q:"What is feature engineering?", a:"Feature engineering is the process of using domain knowledge to create, transform, or select input variables that make machine learning models perform better. It can involve creating new features from existing ones, handling missing values, encoding categorical variables, or scaling numerical values.", eg:"From a single 'purchase_date' column, you might engineer new features like 'day_of_week' or 'is_weekend', which could reveal patterns in customer buying behavior that the raw date alone wouldn't capture."},
{topic:"ML", q:"What is the difference between bagging and boosting?", a:"Bagging, short for Bootstrap Aggregating, trains multiple models independently and in parallel on different random subsets of the data, then averages or votes on their predictions to reduce variance. Boosting trains models sequentially, where each new model focuses on correcting the errors made by the previous ones, reducing bias.", eg:"Random Forest is a bagging technique that trains many independent decision trees, while AdaBoost and Gradient Boosting sequentially build trees that each try to fix the mistakes of the one before it."},
{topic:"ML", q:"What is a decision tree?", a:"A decision tree is a model that splits data into branches based on feature values, forming a tree structure where each internal node represents a decision rule and each leaf represents a predicted outcome. It's easy to interpret but prone to overfitting if grown too deep without pruning.", eg:"A loan approval decision tree might first split applicants by income above or below a threshold, then further split by credit score, eventually reaching a leaf that predicts approve or reject."},
{topic:"ML", q:"What is Random Forest and why does it work better than a single decision tree?", a:"Random Forest is an ensemble method that builds many decision trees, each trained on a random subset of data and a random subset of features, then combines their predictions through majority voting or averaging. This reduces overfitting compared to a single deep decision tree because errors from individual trees tend to cancel out.", eg:"A single decision tree might overfit noise in the training data, but a Random Forest of 100 such trees, each seeing slightly different data and features, generalizes better because their collective vote smooths out individual mistakes."},
{topic:"ML", q:"What is k-means clustering?", a:"K-means is an unsupervised algorithm that partitions data into k clusters by iteratively assigning each point to the nearest cluster centroid and then recalculating centroids as the mean of assigned points, repeating until the assignments stabilize. The value of k must be chosen beforehand, often using techniques like the elbow method.", eg:"A retailer might use k-means to segment customers into groups like budget-conscious, frequent, and high-value shoppers based on purchase frequency and spending, without having predefined labels for these groups."},
{topic:"ML", q:"What is the curse of dimensionality?", a:"The curse of dimensionality refers to the problem where, as the number of features grows, the data becomes increasingly sparse in that high-dimensional space, making distance-based algorithms less effective and requiring exponentially more data to maintain the same level of statistical significance.", eg:"In a dataset with only 2 features, points can cluster meaningfully close together, but with 1,000 features, nearly all points end up roughly equidistant from each other, making techniques like k-nearest neighbors far less reliable."},
{topic:"ML", q:"What is the difference between parametric and non-parametric models?", a:"Parametric models assume a fixed functional form with a limited number of parameters that doesn't grow with the size of the training data, such as linear regression. Non-parametric models make fewer assumptions about the underlying data distribution and their complexity can grow with the amount of data, such as k-nearest neighbors or decision trees.", eg:"Linear regression is parametric because it always assumes a straight-line relationship regardless of dataset size, while k-nearest neighbors is non-parametric since its decision boundary can become arbitrarily complex as more data points are added."},
{topic:"ML", q:"What is a Support Vector Machine?", a:"A Support Vector Machine is a supervised learning algorithm that finds the optimal hyperplane which maximizes the margin between different classes of data. For data that isn't linearly separable, it uses the kernel trick to implicitly map data into a higher-dimensional space where a separating hyperplane can be found.", eg:"For classifying emails as spam or not spam based on two word-frequency features, an SVM would find the line that separates the two classes with the widest possible margin, making it more robust to new, unseen emails."},
{topic:"ML", q:"Why is feature scaling important in machine learning?", a:"Feature scaling normalizes numerical features to a similar range, which is important for distance-based algorithms and gradient descent-based algorithms, since features with larger numeric ranges can otherwise dominate the model's calculations regardless of their actual importance. Common methods include min-max scaling and standardization.", eg:"If one feature is 'age' ranging from 18 to 80 and another is 'income' ranging from 20,000 to 200,000, an unscaled k-nearest neighbors model would let income dominate the distance calculation purely due to its larger scale, not its actual relevance."},
{topic:"ML", q:"What is a ROC curve and what does AUC represent?", a:"A ROC curve plots the True Positive Rate against the False Positive Rate at various classification thresholds, showing the tradeoff between catching positives and generating false alarms. The AUC, Area Under the Curve, summarizes this into a single number between 0 and 1, where 1 represents a perfect classifier and 0.5 represents random guessing.", eg:"Comparing two spam classifiers, the one with an AUC of 0.95 is generally better at distinguishing spam from non-spam across all thresholds than one with an AUC of 0.80."},
{topic:"ML", q:"What is the difference between classification and regression?", a:"Classification predicts a discrete category or class label as output, such as spam or not spam. Regression predicts a continuous numerical value as output, such as a price or temperature.", eg:"Predicting whether a customer will churn or not is a classification problem, while predicting exactly how much revenue that customer will generate next month is a regression problem."},
{topic:"ML", q:"What is ensemble learning?", a:"Ensemble learning combines predictions from multiple individual models to produce a final prediction that is typically more accurate and robust than any single model alone. Common ensemble strategies include bagging, boosting, and stacking, where a meta-model learns how to best combine the outputs of base models.", eg:"A Kaggle competition winning solution often isn't a single model but an ensemble that averages predictions from a Random Forest, a Gradient Boosted tree, and a neural network, since their different error patterns tend to cancel out."},

{topic:"DL", q:"What is an autoencoder?", a:"An autoencoder is a neural network trained to reconstruct its input by first compressing it into a smaller latent representation through an encoder, and then reconstructing the original input from that representation through a decoder. It's commonly used for dimensionality reduction, denoising, and anomaly detection.", eg:"An autoencoder trained on normal network traffic can be used for anomaly detection, since it reconstructs normal traffic patterns well but produces high reconstruction error on unusual, potentially malicious traffic it hasn't learned to compress properly."},
{topic:"DL", q:"What is transfer learning?", a:"Transfer learning reuses a model that has already been trained on a large dataset for one task, and fine-tunes it on a smaller, related dataset for a new task, rather than training a new model from scratch. It's especially useful when labeled data for the target task is limited.", eg:"A model pretrained on millions of general images like ImageNet can be fine-tuned with just a few thousand X-ray images to detect a specific medical condition, leveraging the general visual features it already learned."},
{topic:"DL", q:"What is the difference between an epoch, a batch, and an iteration?", a:"An epoch is one complete pass through the entire training dataset. A batch is a subset of the training data processed together before the model's weights are updated. An iteration is one single update of the model's weights, corresponding to processing one batch.", eg:"With a dataset of 10,000 samples and a batch size of 100, one epoch consists of 100 iterations, since the model processes 100 batches of 100 samples each to cover the full dataset once."},
{topic:"DL", q:"What is a loss function?", a:"A loss function quantifies how far a model's predictions are from the actual target values, producing a single number that the training process tries to minimize. The choice of loss function depends on the task, such as Mean Squared Error for regression or Cross-Entropy Loss for classification.", eg:"In a binary classifier predicting whether an email is spam, Cross-Entropy Loss heavily penalizes the model when it confidently predicts 'not spam' for an email that is actually spam, guiding the model to correct that mistake."},
{topic:"DL", q:"What is the Adam optimizer?", a:"Adam, short for Adaptive Moment Estimation, is an optimization algorithm that combines ideas from momentum and adaptive learning rates, maintaining a moving average of both the gradients and their squared values to adjust the effective learning rate for each parameter individually. It generally converges faster and more reliably than plain stochastic gradient descent.", eg:"Training a deep network with plain SGD might require careful manual tuning of the learning rate, while Adam often works well with its default settings across a wide range of tasks, making it a common default choice."},
